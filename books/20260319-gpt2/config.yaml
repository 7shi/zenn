title: "GPT-2 推論エンジン入門"
summary: "GPT-2 の推論パイプラインを、データの流れに沿って分解します。\n\nテキストはまずトークナイザーによって整数列に変換されます。英語モデルではバイトレベル BPE、日本語モデルでは SentencePiece（ユニグラムモデル）を使います。次に Embedding がこの整数列を連続ベクトル空間に写像し、Transformer Block（LayerNorm → Attention → 残差接続 → LayerNorm → MLP → 残差接続）を 12 回繰り返すことでベクトルを変換します。最後に LM Head がベクトルを語彙全体の確率分布に変換し、サンプリングによって次のトークンが選ばれます。\n\n各章では、この流れの一区間を取り出し、NumPy で動くコンパクトな推論エンジンを動かしながら、「なぜその計算をするのか」を確認していきます。\n\n最終章まで読み終えると、GPT-2 の推論コード全体が見通せるようになるはずです。現代の LLM（GPT-4、Claude など）も Transformer の基本構造は同じであり、ここで得た理解はそのまま応用できます。"
topics: ["gpt2", "transformer", "python"]
published: false
